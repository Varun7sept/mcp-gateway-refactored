<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP Gateway - AI Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1117; color: #e4e4e7; height: 100vh; display: flex; flex-direction: column; }
        .header { background: #1a1b23; border-bottom: 1px solid #2a2b35; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; }
        .header h1 { font-size: 16px; color: #fff; }
        .header a { color: #a855f7; text-decoration: none; font-size: 12px; }
        .header .badge { font-size: 10px; padding: 2px 8px; border-radius: 6px; background: #22c55e20; color: #22c55e; }
        .chat-container { flex: 1; overflow-y: auto; padding: 20px 24px; }
        .welcome { text-align: center; padding: 60px 20px; }
        .welcome h2 { font-size: 22px; color: #fff; margin-bottom: 8px; }
        .welcome p { color: #71717a; font-size: 13px; margin-bottom: 20px; }
        .capabilities { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 8px; max-width: 550px; margin: 0 auto; }
        .capability { padding: 10px 12px; border-radius: 8px; background: #1a1b23; border: 1px solid #2a2b35; font-size: 12px; color: #a1a1aa; cursor: pointer; }
        .capability:hover { border-color: #a855f7; color: #e4e4e7; }
        .message { margin-bottom: 14px; display: flex; gap: 10px; }
        .message.user { justify-content: flex-end; }
        .message .bubble { max-width: 72%; padding: 11px 15px; border-radius: 16px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
        .message.user .bubble { background: linear-gradient(135deg, #a855f7, #7c3aed); color: #fff; border-bottom-right-radius: 4px; }
        .message.ai .bubble { background: #1a1b23; border: 1px solid #2a2b35; color: #e4e4e7; border-bottom-left-radius: 4px; }
        .typing { display: none; margin-bottom: 14px; }
        .typing .dots { display: flex; gap: 4px; padding: 12px 16px; background: #1a1b23; border: 1px solid #2a2b35; border-radius: 16px; width: fit-content; }
        .typing .dots span { width: 7px; height: 7px; border-radius: 50%; background: #a855f7; animation: bounce 1.4s infinite both; }
        .input-area { background: #1a1b23; border-top: 1px solid #2a2b35; padding: 14px 20px; }
        .input-wrapper { display: flex; gap: 8px; align-items: center; background: #0f1117; border: 1px solid #2a2b35; border-radius: 14px; padding: 5px 5px 5px 16px; }
        .input-wrapper:focus-within { border-color: #a855f7; }
        .input-wrapper input { flex: 1; padding: 9px 0; border: none; background: transparent; color: #e4e4e7; font-size: 14px; outline: none; }
        .send-btn { width: 36px; height: 36px; border-radius: 10px; border: none; background: #a855f7; color: #fff; cursor: pointer; }
        .send-btn:hover { background: #9333ea; }
        .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .tool-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #a855f720; color: #a855f7; display: inline-block; margin-right: 4px; }
        .latency-badge { font-size: 10px; color: #52525b; }
        @keyframes bounce { 0%,80%,100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <div class="header">
        <div style="display:flex;align-items:center;gap:10px;">
            <h1>MCP Gateway AI</h1>
            <span class="badge">Agent</span>
        </div>
        <a href="/">Dashboard</a>
    </div>
    <div class="chat-container" id="chat-container">
        <div class="welcome" id="welcome">
            <h2>Ask me anything</h2>
            <p>Multi-step AI agent with real-time tools</p>
            <div class="capabilities">
                <div class="capability" onclick="ask(this)">Weather in Tokyo</div>
                <div class="capability" onclick="ask(this)">Bitcoin price now</div>
                <div class="capability" onclick="ask(this)">Latest tech news</div>
                <div class="capability" onclick="ask(this)">Who is Elon Musk?</div>
                <div class="capability" onclick="ask(this)">Save a note</div>
            </div>
        </div>
    </div>
    <div class="typing" id="typing"><div class="dots"><span></span><span></span><span></span></div></div>
    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="user-input" placeholder="Ask anything..." autocomplete="off">
            <button class="send-btn" id="send-btn" onclick="sendMessage()">→</button>
        </div>
    </div>
    <script>
        let sessionId = 'local-' + Date.now();
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const msg = input.value.trim();
            if (!msg) return;
            addMessage(msg, 'user');
            input.value = '';
            document.getElementById('send-btn').disabled = true;
            document.getElementById('typing').style.display = 'block';
            try {
                const resp = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg, session_id: sessionId })
                });
                const data = await resp.json();
                const answer = data.error || data.answer || 'No response';
                const meta = data.tools_used ? { tools: data.tools_used, latency: data.latency } : {};
                addMessage(answer, 'ai', meta);
            } catch(e) {
                addMessage('Connection error', 'ai', {});
            }
            document.getElementById('typing').style.display = 'none';
            document.getElementById('send-btn').disabled = false;
        }
        function addMessage(text, role, meta) {
            document.getElementById('welcome').style.display = 'none';
            const div = document.createElement('div');
            div.className = 'message ' + role;
            let metaHtml = '';
            if (meta && meta.tools) {
                metaHtml += '<div style="margin-top:6px;">';
                meta.tools.forEach(t => { metaHtml += '<span class="tool-badge">' + t + '</span>'; });
                if (meta.latency) metaHtml += '<span class="latency-badge"> ' + meta.latency + 'ms</span>';
                metaHtml += '</div>';
            }
            div.innerHTML = '<div class="bubble">' + text.replace(/\n/g, '<br>') + metaHtml + '</div>';
            document.getElementById('chat-container').appendChild(div);
            document.getElementById('chat-container').scrollTop = document.getElementById('chat-container').scrollHeight;
        }
        function ask(el) {
            document.getElementById('user-input').value = el.textContent;
            sendMessage();
        }
        document.getElementById('user-input').addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
